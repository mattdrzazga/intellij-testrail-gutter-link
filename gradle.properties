pluginGroup = com.mateo.plugins.testraillink
pluginName = TestRailGutterLink
pluginVersion = 1.0.0

# Build 241 = Android Studio Koala / IntelliJ IDEA 2024.1.
# Raise or lower to match the IDE you run.
pluginSinceBuild = 241

# Platform target used for development. Bump this to match your Android Studio
# if you see compatibility warnings; the plugin uses only stable platform APIs.
platformType = IC
platformVersion = 2024.1

# Bundled plugins we rely on (Java PSI + Kotlin PSI/UAST).
platformBundledPlugins = com.intellij.java, org.jetbrains.kotlin

kotlin.stdlib.default.dependency = false
org.gradle.jvmargs = -Xmx2g -XX:+UseParallelGC
org.gradle.caching = true
org.gradle.configuration-cache = true
